
services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./mappings:/home/wiremock/mappings
    command:
      [
        "--verbose",
        "--disable-banner",
        "--global-response-templating"
      ]
