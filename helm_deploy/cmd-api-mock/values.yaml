wiremock:
  name: cmd-api-mock
  image:
    repository: wiremock/wiremock
    tag: "3.13.2"
    pullPolicy: IfNotPresent
    extraArgs:
      - --global-response-templating
      - --disable-banner
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      capabilities:
        drop:
        - ALL
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
  replicaCount: 1

  service:
    type: ClusterIP
    externalPort: 80
    port: 8080

  resources: {}

  stubs:
    update-snooze.json: |
      {
        "request": {
          "method": "PUT",
          "urlPath": "/preferences/notifications/snooze"
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": {
            "message": "Snooze date updated successfully"
          }
        }
      }


    update-notification-details.json: |
      {
        "request": {
          "method": "PUT",
          "urlPath": "/preferences/notifications/details"
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": {
            "message": "Notification details updated successfully"
          }
        }
      }


    get-user-details.json: |
      {
        "request": {
          "method": "GET",
          "urlPath": "/user/details",
          "queryParameters": {
            "from": { "matches": "^\\d{4}-\\d{2}-\\d{2}$" },
            "to": { "matches": "^\\d{4}-\\d{2}-\\d{2}$" }
          }
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": [
            {
              "date": "{{ request.query.from }}",
              "fullDayType": "SHIFT",
              "fullDayTypeDescription": "Shift",
              "details": [
                {
                  "activity": "Prison Shift",
                  "start": "{{ request.query.from }}T21:00:00Z",
                  "end": "{{ request.query.from }}T23:30:00Z",
                  "parentType": "SHIFT",
                  "displayType": "NIGHT_START",
                  "displayTypeTime": "{{ request.query.from }}T21:00:00Z"
                }
              ]
            },
            {
              "date": "{{ request.query.to }}",
              "fullDayType": "SHIFT",
              "fullDayTypeDescription": "Shift",
              "details": [
                {
                  "activity": "Prison Shift",
                  "start": "{{ request.query.to }}T09:00:00Z",
                  "end": "{{ request.query.to }}T17:00:00Z",
                  "parentType": "SHIFT",
                  "displayType": "DAY_START",
                  "displayTypeTime": "{{ request.query.to }}T09:00:00Z"
                }
              ]
            }
          ]
        }
      }

    get-notification-preferences.json: |
      {
        "request": {
          "method": "GET",
          "urlPath": "/preferences/notifications"
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": {
            "snoozeUntil": "{{ now format='yyyy-MM-dd' }}",
            "email": "me@example.com",
            "preference": "EMAIL"
          }
        }
      }

    get-notifications.json: |
      {
        "request": {
          "method": "GET",
          "urlPath": "/notifications"
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": [
            {
              "description": "Your shift on {{ now format='yyyy-MM-dd' }} has changed.",
              "shiftModified": "{{ now format='yyyy-MM-dd' }}T12:00:00Z",
              "processed": false
            }
          ]
        }
      }

    get-health-ping.json: |
      {
        "request": {
          "method": "GET",
          "url": "/health/ping"
        },
        "response": {
          "status": 200,
          "headers": {
            "Content-Type": "application/json"
          },
          "jsonBody": {
            "status": "UP"
          }
        }
      }
